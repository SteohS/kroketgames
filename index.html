<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- user-scalable=no + touch-action in CSS: prevents toddler pinch/double-tap zoom -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Mini Games" />
  <!-- theme-color matches the manifest + paper background used at launch -->
  <meta name="theme-color" content="#FBF7EF" />
  <title>Mini Games</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <!-- iOS ignores the manifest icons; it needs its own link for Add to Home Screen -->
  <link rel="apple-touch-icon" href="assets/images/icon-180.png" />
  <link rel="icon" type="image/png" href="assets/images/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800&display=swap" rel="stylesheet" />
  <!-- ?v is bumped whenever css/*.css OR js/*.js changes, to bust Safari's
       aggressive cache. Keep the query in sync across the stylesheet and every
       <script> below (they share one version). -->
  <link rel="stylesheet" href="css/styles.css?v=12" />
</head>
<body>

  <!-- ============ ANIMATED SCENE (decorative, behind everything) ============ -->
  <!-- Pure HTML/CSS: blue sky, a slowly shining sun, semitransparent clouds
       drifting in and out of view, and soft rolling grass. pointer-events:none
       so it never intercepts taps (menu buttons, long-press exit still work). -->
  <div class="scene" aria-hidden="true">
    <div class="sun"></div>
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div class="cloud cloud-3"></div>
    <div class="cloud cloud-4"></div>
    <div class="hill hill-back"></div>
    <div class="hill hill-front"></div>
  </div>

  <!-- ============ MENU SCREEN ============ -->
  <main id="menu-screen" class="screen">
    <h1 id="menu-title" class="menu-title">Mini&nbsp;Games</h1>

    <!-- Config is a single panel of clearly-separated sections. -->
    <div class="config-panel">

      <!-- 1. Content categories (animals/fruit/shapes/colors): the first choice.
           Tickable cards injected by app.js from the Content taxonomy. -->
      <section class="config-section">
        <h2 id="choose-content" class="config-subtitle">Choose a theme</h2>
        <div id="category-list" class="game-grid"></div>
      </section>

      <!-- 2. Games: age-grouped tickable cards injected by app.js. -->
      <section class="config-section">
        <h2 id="choose-games" class="config-subtitle">Choose games</h2>
        <div id="game-list" class="game-config"></div>
      </section>

      <!-- 3. Parent options: language + session length. -->
      <section class="config-section config-options">
        <div class="parent-field">
          <label class="lang-label" for="lang-select" id="lang-label">Voice</label>
          <select id="lang-select" class="lang-select">
            <option value="fr">Français</option>
            <option value="nl">Nederlands</option>
            <option value="en">English</option>
          </select>
        </div>
        <div class="parent-field">
          <label class="lang-label" for="limit-select" id="limit-label">Questions</label>
          <select id="limit-select" class="lang-select">
            <option value="">∞</option>
            <option value="5">5</option>
            <option value="10">10</option>
            <option value="15">15</option>
            <option value="20">20</option>
          </select>
        </div>
      </section>

    </div>

    <!-- The one big deliberate action: start playing the ticked games -->
    <button id="start-btn" class="start-btn" type="button">Play</button>

    <!-- Parent corner: small, bottom of screen, deliberately un-shiny -->
    <footer class="parent-bar">
      <button id="credits-btn" class="credits-btn" type="button">Credits</button>
    </footer>
  </main>

  <!-- ============ CREDITS MODAL (parent-facing) ============ -->
  <!-- Attribution for third-party assets. Hidden by default; opened from the
       menu footer. Content is rendered by app.js from the ASSET_CREDITS list. -->
  <div id="credits-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="credits-heading">
    <div class="modal-card">
      <h2 id="credits-heading" class="modal-title">Credits &amp; sources</h2>
      <div id="credits-body" class="credits-body"></div>
      <button id="credits-close" class="credits-close" type="button">Close</button>
    </div>
  </div>

  <!-- ============ GAME SCREEN ============ -->
  <section id="game-screen" class="screen hidden">
    <!-- Invisible parent exit zone: long-press 3s, top-left corner -->
    <div id="exit-zone" aria-hidden="true">
      <svg id="exit-ring" viewBox="0 0 40 40">
        <circle class="ring-bg" cx="20" cy="20" r="16"></circle>
        <circle class="ring-fill" cx="20" cy="20" r="16"></circle>
      </svg>
      <span id="exit-label">exit</span>
    </div>
    <div id="game-container"></div>
  </section>

  <!-- Confetti layer (shared) -->
  <div id="confetti-layer" aria-hidden="true"></div>

  <script src="js/i18n.js?v=12"></script>
  <script src="js/audio.js?v=12"></script>
  <script src="js/data/_registry.js?v=12"></script>
  <script src="js/data/animals.js?v=12"></script>
  <script src="js/data/fruit.js?v=12"></script>
  <script src="js/data/shapes.js?v=12"></script>
  <script src="js/data/colors.js?v=12"></script>
  <!-- Content taxonomy: needs every registry above; used by app.js below. -->
  <script src="js/data/_categories.js?v=12"></script>
  <script src="js/app.js?v=12"></script>
  <!-- Shared game helpers; must load before any game registers. -->
  <script src="js/games/_kit.js?v=12"></script>
  <!-- Game registration order = menu order. Find-it first (category-agnostic). -->
  <script src="js/games/find-it.js?v=12"></script>
  <script src="js/games/animal-sounds.js?v=12"></script>
  <script src="js/games/counting.js?v=12"></script>
  <script src="js/games/free-play.js?v=12"></script>
  <script src="js/games/peekaboo.js?v=12"></script>
</body>
</html>
